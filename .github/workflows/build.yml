name: Build
on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: Test Suite
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  lints:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cargo-audit
        run: |
          VERSION=$(gh api repos/rustsec/rustsec/releases --jq '[.[].tag_name | select(startswith("cargo-audit/"))][0] | ltrimstr("cargo-audit/")')
          curl -sSL "https://github.com/rustsec/rustsec/releases/download/cargo-audit%2F${VERSION}/cargo-audit-x86_64-unknown-linux-gnu-${VERSION}.tgz" | tar xz --strip-components=1 -C /usr/local/bin cargo-audit-x86_64-unknown-linux-gnu-${VERSION}/cargo-audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo audit

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
