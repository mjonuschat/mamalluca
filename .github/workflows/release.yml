name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-**'  # Pre-release versions
      - 'v[0-9]+.[0-9]+.[0-9]+'     # Release versions
  workflow_dispatch:

env:
  BIN_NAME: mamalluca
  PROJECT_NAME: mamalluca
  REPO_NAME: mjonuschat/mamalluca
  BREW_TAP: jondot/homebrew-tap

jobs:
  dist:
    name: Dist
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # don't fail other jobs if one fails
      matrix:
        build: [x86_64-linux, aarch64-linux, x86_64-macos, aarch64-macos, x86_64-windows]
        include:
        - build: x86_64-linux
          os: ubuntu-22.04
          target: x86_64-unknown-linux-gnu
        - build: aarch64-linux
          os: ubuntu-22.04
          target: aarch64-unknown-linux-gnu
        - build: x86_64-macos
          os: macos-latest
          target: x86_64-apple-darwin
        - build: aarch64-macos
          os: macos-latest
          target: aarch64-apple-darwin
        - build: x86_64-windows
          os: windows-2019
          target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.build == 'aarch64-linux'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2

      - name: Run cargo test
        if: matrix.build != 'aarch64-linux' && matrix.build != 'aarch64-macos'
        run: cargo test --workspace --locked

      - name: Build release binary
        run: cargo build --target ${{ matrix.target }} --release --locked -p mamalluca

      - name: Strip binary
        if: matrix.build != 'x86_64-windows'
        run: |
          STRIP_CMD="strip"
          if [ "${{ matrix.build }}" = "aarch64-linux" ]; then
            STRIP_CMD="aarch64-linux-gnu-strip"
          fi
          $STRIP_CMD "target/${{ matrix.target }}/release/mamalluca"

      - name: Package as archive
        shell: bash
        run: |
          mkdir dist
          cp LICENSE README.md dist/
          if [ "${{ matrix.os }}" = "windows-2019" ]; then
            cp "target/${{ matrix.target }}/release/$BIN_NAME.exe" "dist/"
          else
            cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/"
          fi

      - name: Publish release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mamalluca-${{ matrix.build }}
          path: dist

  publish:
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: write
    name: Publish
    needs: [dist]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4

      - run: ls -al mamalluca-*

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Build archive
        shell: bash
        run: |
          set -ex

          rm -rf tmp
          mkdir tmp
          mkdir dist

          for dir in mamalluca-* ; do
              platform=${dir#"mamalluca-"}
              unset exe
              if [[ $platform =~ "windows" ]]; then
                  exe=".exe"
              fi
              pkgname=$PROJECT_NAME-$TAG-$platform
              mkdir tmp/$pkgname
              mv mamalluca-$platform/$BIN_NAME$exe tmp/$pkgname
              cp mamalluca-$platform/LICENSE mamalluca-$platform/README.md tmp/$pkgname/ 2>/dev/null || true
              chmod +x tmp/$pkgname/$BIN_NAME$exe

              if [ "$exe" = "" ]; then
                  tar cJf dist/$pkgname.tar.xz -C tmp $pkgname
              else
                  (cd tmp && 7z a -r ../dist/$pkgname.zip $pkgname)
              fi
          done

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
          body: ${{ steps.changelog.outputs.content }}
